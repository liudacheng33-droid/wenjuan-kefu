<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九型人格测评 · 客服岗位入职评估系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --ink: #1a1814;
            --paper: #f5f1e8;
            --cream: #ebe4d3;
            --accent: #c8472f;
            --gold: #b8924a;
            --olive: #5a6240;
            --slate: #3a4756;
            --muted: #87807a;
            --line: rgba(26, 24, 20, 0.12);
        }
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            font-feature-settings: "kern" 1, "liga" 1;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-image: radial-gradient(circle at 20% 10%, rgba(184, 146, 74, 0.06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(200, 71, 47, 0.04) 0%, transparent 50%);
        }
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.4;
            mix-blend-mode: multiply;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
        }
        /* ========== 通用页面框架 ========== */
        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: none;
        }
        .page.active {
            display: block;
        }
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 60px 40px;
        }
        /* ========== 封面页 ========== */
        #cover .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .cover-frame {
            border: 1px solid var(--ink);
            padding: 80px 60px;
            position: relative;
            background: var(--paper);
        }
        .cover-frame::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid var(--line);
            pointer-events: none;
        }
        .cover-corner {
            position: absolute;
            width: 28px;
            height: 28px;
            border: 2px solid var(--accent);
        }
        .cover-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .cover-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .cover-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .cover-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
        }
        .eyebrow::before {
            content: '— ';
            color: var(--accent);
        }
        .cover-title {
            font-family: 'DM Serif Display', 'Noto Serif SC', serif;
            font-size: clamp(48px, 7vw, 84px);
            font-weight: 400;
            line-height: 0.95;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .cover-title .num {
            font-style: italic;
            color: var(--accent);
        }
        .cover-sub {
            font-size: 18px;
            color: var(--slate);
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
            max-width: 560px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 32px 0;
        }
        .divider .line {
            flex: 1;
            height: 1px;
            background: var(--line);
        }
        .divider .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }
        /* 修改：只保留 1列 (姓名) 和 1列 (岗位)，总2列 */
        .info-form {
            display: grid;
            grid-template-columns: 1fr; /* 改为单列，或者 1fr 1fr 如果想并排显示姓名和岗位 */
            gap: 20px;
            margin-bottom: 36px;
        }
        /* 如果你希望姓名和岗位并排，取消下面的注释并调整 grid-template-columns */
        /*
        .info-form {
            grid-template-columns: 1fr 1fr;
        }
        */
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field label {
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .field input, .field select {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--ink);
            padding: 8px 0;
            font-family: 'Noto Serif SC', serif;
            font-size: 16px;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus, .field select:focus {
            border-bottom-color: var(--accent);
        }
        .btn {
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 18px 36px;
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .btn::after {
            content: '→';
            font-size: 18px;
            transition: transform 0.3s;
        }
        .btn:hover::after {
            transform: translateX(4px);
        }
        .btn:hover {
            background: var(--accent);
        }
        .btn.ghost {
            background: transparent;
            color: var(--ink);
            border: 1px solid var(--ink);
        }
        .btn.ghost:hover {
            background: var(--ink);
            color: var(--paper);
        }
        .meta-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--line);
        }
        .meta-item .label {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .meta-item .value {
            font-size: 22px;
            font-weight: 600;
            font-family: 'DM Serif Display', serif;
        }
        /* ========== 测试页 ========== */
        #test-page .container {
            padding: 40px 40px 120px;
        }
        .test-header {
            position: sticky;
            top: 0;
            background: var(--paper);
            padding: 24px 0;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--line);
            z-index: 10;
        }
        .test-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .candidate-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }
        .progress-counter {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
        }
        .progress-counter .current {
            color: var(--accent);
            font-weight: 700;
        }
        .progress-counter .total {
            color: var(--muted);
        }
        .progress-track {
            height: 2px;
            background: var(--line);
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .question-card {
            padding: 32px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--line);
            position: relative;
            transition: all 0.3s;
        }
        .question-card:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: var(--ink);
        }
        .question-card.answered {
            background: rgba(184, 146, 74, 0.05);
            border-color: var(--gold);
        }
        .q-num {
            position: absolute;
            top: -12px;
            left: 24px;
            background: var(--paper);
            padding: 0 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 0.1em;
        }
        .q-text {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 24px;
            color: var(--ink);
            font-weight: 500;
        }
        .scale {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            align-items: stretch;
        }
        .scale-option {
            position: relative;
            cursor: pointer;
            padding: 18px 8px;
            text-align: center;
            border: 1.5px solid var(--line);
            background: var(--paper);
            transition: all 0.2s;
            user-select: none;
        }
        .scale-option:hover {
            border-color: var(--ink);
            transform: translateY(-2px);
            background: rgba(255,255,255,0.8);
        }
        .scale-option input {
            display: none;
        }
        .scale-option .dot {
            display: block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            margin: 0 auto 8px;
            transition: all 0.2s;
            background: transparent;
        }
        .scale-option .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
            display: block;
        }
        .scale-option .label-text {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }
        /* 选中状态 */
        .scale-option.selected {
            border-color: var(--accent);
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(200, 71, 47, 0.35);
        }
        .scale-option.selected .dot {
            background: var(--paper);
            border-color: var(--paper);
            box-shadow: inset 0 0 0 4px var(--accent);
        }
        .scale-option.selected .num {
            color: var(--paper);
        }
        .scale-option.selected .label-text {
            color: rgba(245, 241, 232, 0.8);
        }
        .scale-option.selected::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 14px;
            color: var(--paper);
            font-weight: bold;
        }
        .test-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--paper);
            border-top: 1px solid var(--ink);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
        }
        .footer-info {
            font-size: 13px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .footer-info span {
            color: var(--accent);
            font-weight: 700;
        }
        /* ========== 结果页 ========== */
        #result-page .container {
            padding: 60px 40px;
        }
        .result-header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 2px solid var(--ink);
            position: relative;
        }
        .result-header::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--accent);
        }
        .result-meta-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .result-meta-row .item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }
        .result-meta-row .item strong {
            color: var(--ink);
            margin-left: 4px;
        }
        .result-title {
            font-family: 'DM Serif Display', 'Noto Serif SC', serif;
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 12px;
        }
        .result-subtitle {
            font-size: 16px;
            color: var(--slate);
            font-style: italic;
        }
        /* ... (其余CSS样式保持不变，为了节省篇幅这里省略，实际使用请保留原样) ... */
    </style>
</head>
<body>
    <div class="grain"></div>

    <!-- ========== 封面页 ========== -->
    <section class="page active" id="cover">
        <div class="container">
            <div class="cover-frame">
                <div class="cover-corner tl"></div>
                <div class="cover-corner tr"></div>
                <div class="cover-corner bl"></div>
                <div class="cover-corner br"></div>
                
                <div class="eyebrow">Enneagram Assessment · 入职评测系统</div>
                <h1 class="cover-title">九型人格<br><span class="num">No.</span>测评<span class="num">.72</span></h1>
                <p class="cover-sub">
                    本测评专为<strong>客服岗位入职评估</strong>设计，覆盖<strong>未成年退款话务、在线客服、协商专员</strong>三类岗位，通过 72 道情境化题目从九种人格维度全面评估候选人的岗位适配度、性格优势与潜在风险，为人力资源决策提供科学参考。
                </p>
                <div class="divider">
                    <div class="line"></div>
                    <div class="dot"></div>
                    <div class="line"></div>
                </div>
                
                <!-- 修改：移除了工号和所属部门的 field -->
                <div class="info-form">
                    <div class="field">
                        <label>姓名 / Name</label>
                        <input type="text" id="cand-name" placeholder="请输入姓名">
                    </div>
                    <!-- 应聘岗位保持不变 -->
                    <div class="field">
                        <label>应聘岗位 / Position</label>
                        <select id="cand-position">
                            <option value="未成年退款话务客服">未成年退款话务客服</option>
                            <option value="在线客服">在线客服</option>
                            <option value="协商专员客服">协商专员客服</option>
                        </select>
                    </div>
                </div>
                
                <!-- 修改：点击开始前检查是否有缓存 -->
                <button class="btn" onclick="checkAndStartTest()">开始测评</button>
                
                <div class="meta-info">
                    <div class="meta-item">
                        <div class="label">题目数量</div>
                        <div class="value">72 题</div>
                    </div>
                    <div class="meta-item">
                        <div class="label">预计时长</div>
                        <div class="value">15 分钟</div>
                    </div>
                    <div class="meta-item">
                        <div class="label">评估维度</div>
                        <div class="value">9 型 · 4 维</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ========== 测试页 ========== -->
    <section class="page" id="test-page">
        <div class="container">
            <div class="test-header">
                <div class="test-header-row">
                    <div class="candidate-tag" id="header-tag">候选人 · ——</div>
                    <div class="progress-counter">
                        <span class="current" id="answered-count">0</span>
                        <span class="total"> / 72</span>
                    </div>
                </div>
                <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
            <div class="questions-list" id="questions-list"></div>
        </div>
        <div class="test-footer">
            <div class="footer-info">已答题 <span id="footer-answered">0</span> · 剩余 <span id="footer-remaining">72</span></div>
            <button class="btn" id="submit-btn" onclick="submitTest()" disabled style="opacity: 0.4; cursor: not
